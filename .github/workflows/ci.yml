name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Xvfb (for GUI tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Build and run unit tests (headful Swing tests via Xvfb)
        run: |
          xvfb-run -a ./mvnw -B -V test

      - name: Package (on success)
        if: success()
        run: |
          ./mvnw -B -V -DskipTests package

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: Projects/vbsu_esys/target/*.jar

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify status
        run: |
          echo "Build status: ${{ needs.build.result }}"
